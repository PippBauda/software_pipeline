name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: .tooling

      - name: Link node_modules to root (for eslint config resolution)
        run: ln -s .tooling/node_modules node_modules

      - name: Lint
        run: npx --prefix .tooling eslint .

      - name: Check formatting
        run: npm run format:check
        working-directory: .tooling

      - name: Run tests
        run: npm test
        working-directory: .tooling
