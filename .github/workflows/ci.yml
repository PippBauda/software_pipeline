name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      # fix #14 — pinned to full SHA for supply-chain security
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js ${{ matrix.node-version }}
        # fix #14 — pinned to full SHA
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}

      # fix #4 — deterministic install from lockfile
      - name: Install dependencies
        run: npm ci
        working-directory: .tooling

      # eslint.config.js is in the repo root and uses ESM imports (@eslint/js, globals).
      # Node.js ESM resolution does not support NODE_PATH, so node_modules must be
      # reachable from the root. A symlink is the cleanest solution without moving
      # the config file or duplicating dependencies.
      - name: Link node_modules for eslint config
        run: ln -s .tooling/node_modules node_modules

      - name: Lint (ESLint)
        run: npx --prefix .tooling eslint .

      - name: Lint (Markdown)
        run: npx --prefix .tooling markdownlint '**/*.md' --ignore node_modules --ignore .tooling/node_modules
        
      - name: Check formatting
        run: npm run format:check
        working-directory: .tooling

      - name: Check version consistency
        run: node scripts/check-version.js
        working-directory: .tooling

      - name: Type check (JSDoc)
        run: npm run typecheck
        working-directory: .tooling

      - name: Check agent sync (OpenCode ↔ Copilot)
        run: node scripts/sync-check-agents.js --verbose
        working-directory: .tooling

      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: .tooling

      - name: Check coverage threshold (≥ 80%)
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';
          const lcov = readFileSync('coverage.lcov', 'utf8');
          const lf = (lcov.match(/^LF:(\d+)/gm) || []).reduce((s, x) => s + Number(x.slice(3)), 0);
          const lh = (lcov.match(/^LH:(\d+)/gm) || []).reduce((s, x) => s + Number(x.slice(3)), 0);
          if (lf === 0) { console.log('No lines found in coverage report'); process.exit(0); }
          const pct = Math.round(lh / lf * 100);
          console.log(`Line coverage: ${pct}% (${lh}/${lf} lines)`);
          if (pct < 80) { console.error('Coverage below threshold (80%)'); process.exit(1); }
          console.log('Coverage threshold met.');
          EOF
        working-directory: .tooling
